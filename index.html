<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 게임 시장 트리맵</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root { --fs: 1.25; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; background:#0a0e1a; color:#e2e8f0; font-size:calc(16px * var(--fs)); }
.header { padding:28px 32px 0; }
h1 { font-size:calc(30px * var(--fs)); color:#f8fafc; margin-bottom:6px; font-weight:800; }
.subtitle { color:#94a3b8; font-size:calc(15px * var(--fs)); margin-bottom:12px; }

.source-badge { display:inline-block; margin-top:6px; padding:6px 16px; background:#1e293b; border:1px solid #334155; border-radius:8px; font-size:calc(14px * var(--fs)); color:#cbd5e1; font-weight:600; }
.source-badge strong { color:#e2e8f0; }

.controls { display:flex; gap:14px; padding:14px 32px; flex-wrap:wrap; align-items:center; }
.ctrl-group { display:flex; align-items:center; gap:8px; }
.ctrl-group label { font-size:calc(14px * var(--fs)); color:#cbd5e1; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
select, button { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:10px 16px; font-size:calc(15px * var(--fs)); cursor:pointer; font-family:inherit; }
select:hover, button:hover { border-color:#3b82f6; }
button.active { background:#1e40af; border-color:#3b82f6; color:#fff; }
.btn-group { display:flex; gap:0; }
.btn-group button { border-radius:0; border-right:none; }
.btn-group button:first-child { border-radius:8px 0 0 8px; }
.btn-group button:last-child { border-radius:0 8px 8px 0; border-right:1px solid #334155; }
.btn-group button.active { border-color:#3b82f6; }
input[type=text] { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:10px 16px; font-size:calc(15px * var(--fs)); font-family:inherit; width:160px; }
input[type=text]:focus { outline:none; border-color:#3b82f6; }
input[type=number] { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:8px 12px; font-size:calc(14px * var(--fs)); font-family:inherit; width:90px; text-align:right; }
input[type=number]:focus { outline:none; border-color:#3b82f6; }

/* 국가 검색 드롭다운 */
.filter-wrapper { position:relative; }
.filter-search { position:relative; }
.filter-dropdown { display:none; position:absolute; top:100%; left:0; width:260px; max-height:320px; overflow-y:auto; background:#1e293b; border:1px solid #334155; border-radius:8px; z-index:50; margin-top:4px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
.filter-dropdown.open { display:block; }
.filter-dropdown .fd-item { padding:10px 16px; cursor:pointer; font-size:calc(14px * var(--fs)); border-bottom:1px solid #1a2332; }
.filter-dropdown .fd-item:hover { background:#334155; }
.filter-dropdown .fd-item.active { background:#1e40af; color:#fff; }
.filter-dropdown .fd-group { padding:6px 16px; font-size:calc(12px * var(--fs)); color:#94a3b8; font-weight:700; text-transform:uppercase; background:#0f172a; }

#treemap { width:100%; height:calc(100vh - 280px); min-height:500px; background:#111827; border-radius:12px; overflow:hidden; position:relative; }
#back-btn { display:none; background:#1e40af; color:#fff; border:1px solid #3b82f6; border-radius:8px; padding:7px 16px; font-size:calc(14px * var(--fs)); font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all .15s; }
#back-btn:hover { background:#2563eb; }
#back-btn.visible { display:inline-flex; align-items:center; gap:4px; }
.treemap-container { padding:16px 32px 80px; }

.node { position:absolute; overflow:hidden; border:1px solid rgba(0,0,0,0.3); transition:opacity .15s; cursor:pointer; }
.node:hover { z-index:10; border-color:#fff; box-shadow:inset 0 0 0 2px #fff; filter:brightness(1.15); }
.node-label { padding:10px 12px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.9); pointer-events:none; line-height:1.4; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.node-label span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.node-label .revenue { font-weight:800; display:block; margin-top:4px; }
.node-label .growth { display:block; margin-top:3px; opacity:.9; }
.node-label .share { display:block; margin-top:2px; opacity:.7; }
.node-rank { position:absolute; top:6px; right:6px; min-width:24px; height:24px; border-radius:12px; background:rgba(0,0,0,0.55); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; padding:0 6px; pointer-events:none; backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.15); }

.legend { display:flex; gap:16px; padding:10px 32px; align-items:center; flex-wrap:wrap; }
.legend-title { font-size:calc(15px * var(--fs)); color:#94a3b8; font-weight:700; }
.legend-bar { display:flex; height:20px; width:320px; border-radius:4px; overflow:hidden; }
.legend-bar div { flex:1; }
.legend-labels { display:flex; justify-content:space-between; width:320px; font-size:calc(13px * var(--fs)); color:#94a3b8; margin-top:2px; }

#tooltip { display:none; position:fixed; background:#1e293b; border:1px solid #475569; border-radius:12px; padding:18px 22px; font-size:calc(15px * var(--fs)); z-index:100; pointer-events:none; box-shadow:0 8px 32px rgba(0,0,0,.6); max-width:820px; min-width:340px; }
#tooltip h3 { font-size:calc(18px * var(--fs)); color:#f8fafc; margin-bottom:10px; font-weight:800; }
#tooltip .row { display:flex; justify-content:space-between; margin:5px 0; font-size:calc(15px * var(--fs)); }
#tooltip .row .label { color:#cbd5e1; }
#tooltip .row .value { color:#e2e8f0; font-weight:700; }
#tooltip .games { margin-top:10px; padding-top:10px; border-top:1px solid #334155; font-size:calc(14px * var(--fs)); color:#cbd5e1; line-height:1.6; }
#tooltip .games strong { color:#e2e8f0; font-size:calc(14px * var(--fs)); }
#tooltip .top-games { margin-top:12px; padding-top:12px; border-top:1px solid #334155; }
#tooltip .top-games-title { font-size:calc(13px * var(--fs)); color:#94a3b8; font-weight:700; margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
#tooltip .tg-table { width:100%; border-collapse:collapse; font-size:calc(13px * var(--fs)); }
#tooltip .tg-table th { text-align:left; color:#64748b; font-weight:600; padding:4px 8px; border-bottom:1px solid #334155; font-size:calc(11px * var(--fs)); text-transform:uppercase; letter-spacing:.3px; }
#tooltip .tg-table th.r { text-align:right; }
#tooltip .tg-table td { padding:4px 8px; border-bottom:1px solid rgba(51,65,85,0.4); white-space:nowrap; }
#tooltip .tg-table td.r { text-align:right; font-variant-numeric:tabular-nums; }
#tooltip .tg-table tr:last-child td { border-bottom:none; }
#tooltip .tg-rank { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-size:calc(11px * var(--fs)); font-weight:800; }
#tooltip .tg-rank.gold { background:#f59e0b; color:#000; }
#tooltip .tg-rank.silver { background:#94a3b8; color:#000; }
#tooltip .tg-rank.bronze { background:#b45309; color:#fff; }
#tooltip .tg-rank.normal { background:#334155; color:#cbd5e1; }
#tooltip .tg-name { color:#e2e8f0; font-weight:600; max-width:200px; overflow:hidden; text-overflow:ellipsis; }
#tooltip .tg-rev { color:#4ade80; font-weight:700; }
#tooltip .tg-dl { color:#60a5fa; }
#tooltip .tg-dau { color:#c084fc; }
#tooltip .tg-layout { display:flex; gap:20px; }
#tooltip .tg-left { min-width:220px; }
#tooltip .tg-right { flex:1; min-width:0; }
#tooltip .sparkline { margin-top:12px; }
#tooltip .spark-col { display:inline-block; text-align:center; margin-right:4px; vertical-align:bottom; }
#tooltip .spark-bar { display:block; margin:0 auto 2px; border-radius:2px; min-height:4px; }
#tooltip .spark-val { font-size:calc(11px * var(--fs)); color:#cbd5e1; font-weight:600; white-space:nowrap; }
#tooltip .spark-yr { font-size:calc(11px * var(--fs)); color:#94a3b8; }

.breadcrumb { padding:10px 32px 6px; font-size:calc(20px * var(--fs)); color:#e2e8f0; font-weight:700; }
.breadcrumb span { cursor:pointer; color:#3b82f6; font-weight:700; }
.breadcrumb span:hover { text-decoration:underline; }
.breadcrumb .bc-sep { color:#475569; font-weight:400; margin:0 2px; }
.breadcrumb .bc-year { color:#64748b; font-weight:400; font-size:calc(16px * var(--fs)); margin-left:6px; }

.stats { display:flex; gap:28px; padding:0 32px 10px; flex-wrap:wrap; }
.stat { font-size:calc(15px * var(--fs)); color:#cbd5e1; }
.stat strong { color:#e2e8f0; font-size:calc(18px * var(--fs)); }

.note { padding:6px 32px; font-size:calc(14px * var(--fs)); color:#cbd5e1; }
.note.warning { background:#1e293b; border-left:3px solid #f59e0b; padding:8px 16px 8px 32px; margin:4px 32px; border-radius:0 8px 8px 0; }

/* 시장 요약 카드 */
.summary-cards { display:flex; gap:12px; padding:8px 32px 4px; flex-wrap:wrap; }
.summary-card { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:12px 18px; min-width:160px; }
.summary-card .sc-label { font-size:calc(12px * var(--fs)); color:#94a3b8; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
.summary-card .sc-value { font-size:calc(20px * var(--fs)); font-weight:800; color:#f8fafc; }
.summary-card .sc-sub { font-size:calc(13px * var(--fs)); color:#cbd5e1; margin-top:2px; }

/* Top 5 하이라이트 */
.top5 { display:none; padding:6px 32px; }
.top5.visible { display:flex; gap:8px; flex-wrap:wrap; }
.top5-chip { background:#1e293b; border:1px solid #334155; border-radius:20px; padding:6px 14px; font-size:calc(13px * var(--fs)); display:flex; align-items:center; gap:6px; }
.top5-rank { background:#3b82f6; color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:calc(11px * var(--fs)); font-weight:800; }
.top5-name { color:#e2e8f0; font-weight:600; }
.top5-rev { color:#cbd5e1; }
</style>
</head>
<body>

<div class="header">
  <h1>글로벌 게임 시장 인터랙티브 트리맵</h1>
  <p class="subtitle">사각형 크기 = 매출 규모 | 색상 = CAGR (초록=성장, 빨강=하락) | 클릭으로 드릴다운</p>
  <div id="source-badge" class="source-badge"><strong>출처:</strong> Sensor Tower 2021-2025 (iOS+Google Play IAP, Google 중국 제외, 스토어 수수료 ~30% 차감 후 순매출)</div>
</div>

<div class="controls">
  <div class="ctrl-group" id="platform-group">
    <label>플랫폼</label>
    <div class="btn-group">
      <button id="btn-mobile" class="active" onclick="setPlatform('mobile')">모바일</button>
      <button id="btn-steam" onclick="setPlatform('steam')">스팀/PC</button>
    </div>
  </div>
  <div class="ctrl-group" id="view-group">
    <label>기준</label>
    <div class="btn-group">
      <button id="btn-genre" class="active" onclick="setView('genre')">장르별</button>
      <button id="btn-country" onclick="setView('country')">국가별</button>
      <button id="btn-subgenre" onclick="setView('subgenre')">서브장르</button>
    </div>
  </div>
  <div class="ctrl-group filter-wrapper" id="filter-group">
    <label>필터</label>
    <div class="filter-search">
      <input type="text" id="filter-input" placeholder="전체 (글로벌)" autocomplete="off"
        onfocus="openFilterDropdown()" oninput="filterDropdownSearch(this.value)">
      <div class="filter-dropdown" id="filter-dropdown"></div>
    </div>
  </div>
  <div class="ctrl-group" id="year-group">
    <label>연도</label>
    <select id="year-select" onchange="render()">
      <option value="2025" selected>2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
      <option value="2021">2021</option>
    </select>
  </div>
  <div class="ctrl-group" id="cagr-group">
    <label>CAGR 기간</label>
    <div class="btn-group" id="cagr-btn-group">
      <button id="btn-cagr1" onclick="setCagrPeriod(1)">1년</button>
      <button id="btn-cagr2" onclick="setCagrPeriod(2)">2년</button>
      <button id="btn-cagr3" onclick="setCagrPeriod(3)">3년</button>
      <button id="btn-cagr4" class="active" onclick="setCagrPeriod(4)">4년</button>
    </div>
  </div>
  <div class="ctrl-group" id="currency-group">
    <label>통화</label>
    <div class="btn-group">
      <button id="btn-usd" class="active" onclick="setCurrency('usd')">USD ($)</button>
      <button id="btn-krw" onclick="setCurrency('krw')">KRW (₩)</button>
    </div>
  </div>
  <div class="ctrl-group" id="fx-group" style="display:none">
    <label>환율</label>
    <input type="number" id="fx-rate" value="1400" min="100" max="9999" step="10" onchange="render()">
    <span style="font-size:13px;color:#64748b">원/달러</span>
  </div>
  <div class="ctrl-group">
    <label>글자</label>
    <div class="btn-group">
      <button id="btn-fs-s" onclick="setFontScale(1)">보통</button>
      <button id="btn-fs-m" class="active" onclick="setFontScale(1.25)">크게</button>
      <button id="btn-fs-l" onclick="setFontScale(1.5)">아주 크게</button>
    </div>
  </div>
</div>

<div class="legend">
  <span class="legend-title">CAGR (연평균 성장률)</span>
  <div>
    <div class="legend-bar">
      <div style="background:#991b1b" title="-40% ~ -20%"></div>
      <div style="background:#dc2626" title="-20% ~ -10%"></div>
      <div style="background:#f87171" title="-10% ~ 0%"></div>
      <div style="background:#6b7280" title="0% ~ +5%"></div>
      <div style="background:#4ade80" title="+5% ~ +20%"></div>
      <div style="background:#16a34a" title="+20% ~ +40%"></div>
      <div style="background:#166534" title="+40%+"></div>
    </div>
    <div class="legend-labels" style="width:320px;">
      <span>-40%</span><span>-10%</span><span>0%</span><span>+20%</span><span>+40%+</span>
    </div>
  </div>
</div>

<div class="summary-cards" id="summary-cards"></div>
<div class="breadcrumb" id="breadcrumb"></div>
<div class="stats" id="stats"></div>
<div class="top5 visible" id="top5"></div>
<div class="note" id="note"></div>
<div id="back-btn-wrap" style="padding:0 32px;"><button id="back-btn" onclick="resetView()">← 전체 장르</button></div>

<div class="treemap-container">
  <div id="treemap"></div>
</div>

<div id="tooltip"></div>

function getFx() {
  if (state.currency === 'usd') return 1;
  return parseFloat(document.getElementById('fx-rate').value) || 1400;
}

function fmt(n) {
  const fx = getFx();
  const v = n * fx;
  if (state.currency === 'krw') {
    if (v >= 1e12) return (v/1e12).toFixed(1) + '조원';
    if (v >= 1e8) return (v/1e8).toFixed(0) + '억원';
    if (v >= 1e4) return (v/1e4).toFixed(0) + '만원';
    return Math.round(v) + '원';
  }
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + Math.round(v);
}

function fmtCompact(n) {
  const fx = getFx();
  const v = n * fx;
  if (state.currency === 'krw') {
    if (v >= 1e12) return (v/1e12).toFixed(1) + '조';
    if (v >= 1e8) return (v/1e8).toFixed(0) + '억';
    return (v/1e6).toFixed(0) + 'M';
  }
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  return '$' + (v/1e3).toFixed(0) + 'K';
}

function cagrColor(cagr) {
  if (cagr === null) return '#374151';
  if (cagr <= -40) return '#7f1d1d';
  if (cagr <= -20) return '#991b1b';
  if (cagr <= -10) return '#dc2626';
  if (cagr <= -3) return '#ef4444';
  if (cagr <= 3) return '#6b7280';
  if (cagr <= 10) return '#22c55e';
  if (cagr <= 20) return '#16a34a';
  if (cagr <= 40) return '#15803d';
  return '#166534';
}

function cagrSign(c) {
  if (c === null) return 'N/A';
  return c >= 0 ? '+' + c.toFixed(1) + '%' : c.toFixed(1) + '%';
}
function getCagr(d) {
  // 선택 연도를 종료점으로 동적 CAGR 계산
  if (d.yearly) {
    const endYear = parseInt(state.year);
    const span = state.cagrPeriod;
    const startYear = endYear - span;
    const endRev = d.yearly[String(endYear)] || 0;
    const startRev = d.yearly[String(startYear)] || 0;
    if (startRev > 0 && endRev > 0) {
      return (Math.pow(endRev / startRev, 1 / span) - 1) * 100;
    }
    // 시작 연도 데이터 없으면 가능한 가장 오래된 연도 사용
    const years = Object.keys(d.yearly).map(Number).filter(y => y < endYear).sort();
    if (years.length > 0 && endRev > 0) {
      const fallbackStart = years[0];
      const fallbackRev = d.yearly[String(fallbackStart)];
      const actualSpan = endYear - fallbackStart;
      if (fallbackRev > 0 && actualSpan > 0) {
        return (Math.pow(endRev / fallbackRev, 1 / actualSpan) - 1) * 100;
      }
    }
    // 계산 불가 (2021년 등 이전 데이터 없음)
    return null;
  }
  return null;
}
function getCagrLabel(d) {
  if (d.yearly) {
    const endYear = parseInt(state.year);
    const span = state.cagrPeriod;
    const startYear = endYear - span;
    const startRev = d.yearly[String(startYear)] || 0;
    if (startRev > 0) return span + '년';
    const years = Object.keys(d.yearly).map(Number).filter(y => y < endYear).sort();
    if (years.length > 0) return (endYear - years[0]) + '년';
  }
  return null;
}

        }));

function buildFilterOptions() {
  filterOptions = [];
  if (state.platform === 'steam') return;

  if (state.view === 'genre' || state.view === 'subgenre') {
    const major = ['US','CN','JP','KR','DE','GB','FR','BR','IN','SA','TW','ID','TH'];
    filterOptions.push({ type:'group', label:'주요국' });
    for (const cc of major) {
      const cn = COUNTRY_MAP[cc];
      if (cn) filterOptions.push({ value: cc, label: cn + ' (' + cc + ')', search: cn + cc });
    }
    filterOptions.push({ type:'group', label:'기타' });
    const used = new Set(major);
    Object.entries(COUNTRY_MAP).filter(([c]) => !used.has(c) && c!=='OT').sort((a,b)=>a[1].localeCompare(b[1],'ko'))
      .forEach(([cc,cn]) => { filterOptions.push({ value: cc, label: cn + ' (' + cc + ')', search: cn + cc }); });
  } else if (state.view === 'country') {
    const genres = [...new Set(DATA.mobile_genre_country.map(d => d.genre))].sort();
    for (const g of genres) {
      const kr = DATA.mobile_genres.find(d => d.name === g);
      const label = kr ? kr.name_kr : g;
      filterOptions.push({ value: g, label: label, search: label + g });
    }
  }
}

function renderFilterDropdown(query) {

  const q = query.toLowerCase();
  const filterType = state.view === 'country' ? '장르 필터' : state.view === 'subgenre' ? '장르 필터' : '국가 필터';
  let html = '<div class="fd-group">' + filterType + '</div>';
  html += '<div class="fd-item' + (state.filter==='all'?' active':'') + '" onclick="selectFilter(\'all\',\'전체 (글로벌)\')">전체 (글로벌)</div>';
  for (const opt of filterOptions) {
    if (opt.type === 'group') {
      if (!q) html += '<div class="fd-group">' + opt.label + '</div>';
      continue;
    }
    if (q && !opt.search.toLowerCase().includes(q)) continue;
    const active = state.filter === opt.value ? ' active' : '';
    html += '<div class="fd-item' + active + '" onclick="selectFilter(\'' + opt.value + '\',\'' + opt.label.replace(/'/g,"\\'") + '\')">' + opt.label + '</div>';
  }
  dd.innerHTML = html;
}

  const cagrItems = items.filter(d => getCagr(d) !== null);
  const cagrAvailable = cagrItems.length > 0;
  const cagrTotalRev = cagrItems.reduce((s,d) => s + d.revenue, 0);
  const avgCagr = cagrAvailable && cagrTotalRev > 0 ? cagrItems.reduce((s,d) => s + getCagr(d) * d.revenue, 0) / cagrTotalRev : null;
  const growing = cagrItems.filter(d => getCagr(d) > 0).length;

  // 시장 요약 카드
  const topItem = items[0] || {name:'-',revenue:0};
  const topShare = totalRev > 0 ? (topItem.revenue / totalRev * 100).toFixed(1) : 0;
  let growthCard = '', declineCard = '';
  if (cagrAvailable) {
    const fastestGrowing = [...cagrItems].sort((a,b) => getCagr(b) - getCagr(a))[0];
    const fastestDecline = [...cagrItems].sort((a,b) => getCagr(a) - getCagr(b))[0];
    growthCard = '<div class="summary-card"><div class="sc-label">최고 성장</div><div class="sc-value" style="color:#4ade80">' + fastestGrowing.name + '</div><div class="sc-sub">' + cagrSign(getCagr(fastestGrowing)) + ' (' + getCagrLabel(fastestGrowing) + ')</div></div>';
    declineCard = '<div class="summary-card"><div class="sc-label">최대 하락</div><div class="sc-value" style="color:#f87171">' + fastestDecline.name + '</div><div class="sc-sub">' + cagrSign(getCagr(fastestDecline)) + ' (' + getCagrLabel(fastestDecline) + ')</div></div>';
  }
  document.getElementById('summary-cards').innerHTML =
    '<div class="summary-card"><div class="sc-label">전체 시장 규모</div><div class="sc-value">' + fmt(totalRev) + '</div><div class="sc-sub">' + state.year + ' 기준</div></div>' +
    '<div class="summary-card"><div class="sc-label">1위</div><div class="sc-value">' + topItem.name + '</div><div class="sc-sub">' + fmt(topItem.revenue) + ' (' + topShare + '%)</div></div>' +
    growthCard + declineCard;

  const statsHtml = cagrAvailable
    ? '<div class="stat">가중평균 CAGR <strong style="color:' + (avgCagr>=0?'#4ade80':'#f87171') + '">' + cagrSign(avgCagr) + '</strong> (' + getCagrLabel(cagrItems[0]) + ')</div>' +
      '<div class="stat">성장 <strong style="color:#4ade80">' + growing + '</strong> / 하락 <strong style="color:#f87171">' + (cagrItems.length-growing) + '</strong></div>'
    : '<div class="stat" style="color:#94a3b8">CAGR: 이전 연도 데이터 없음</div>';
  document.getElementById('stats').innerHTML =
    statsHtml + '<div class="stat">항목 수 <strong>' + items.length + '</strong></div>';

  // Top 5 칩
  const top5El = document.getElementById('top5');
  const top5 = items.slice(0,5);
  top5El.innerHTML = top5.map((d,i) =>
    '<div class="top5-chip"><span class="top5-rank">' + (i+1) + '</span><span class="top5-name">' + d.name + '</span><span class="top5-rev">' + fmt(d.revenue) + '</span>' + (getCagr(d) !== null ? '<span style="color:' + (getCagr(d)>=0?'#4ade80':'#f87171') + ';font-weight:700;margin-left:2px">' + cagrSign(getCagr(d)) + '</span>' : '') + '</div>'
  ).join('');
  top5El.classList.toggle('visible', items.length > 3);

  // 스팀 노트
  const noteEl = document.getElementById('note');
  if (state.platform === 'steam') {
    noteEl.className = 'note warning';
    noteEl.innerHTML = '⚠️ Steam 태그 체계에서 Action은 최상위 장르이며, FPS/TPS 등 슈터 장르가 Action에 포함됨. 데이터는 추정치(VG Insights)입니다.';
  } else {
    noteEl.className = 'note';
    noteEl.innerHTML = '';
  }

  const root = d3.hierarchy({ children: items.map(d => ({ ...d, value: d.revenue })) })
    .sum(d => d.value || 0).sort((a,b) => b.value - a.value);

  d3.treemap().size([width, height]).padding(2).round(true)(root);
  container.innerHTML = '';

  // 순위 매핑 (매출 기준 정렬)
  const ranked = root.leaves().slice().sort((a,b) => b.data.revenue - a.data.revenue);
  const rankMap = new Map();
  ranked.forEach((leaf, i) => rankMap.set(leaf, i + 1));

  root.leaves().forEach(leaf => {
    const d = leaf.data;
    const rank = rankMap.get(leaf);
    const cagr = getCagr(d);
    const share = totalRev > 0 ? (d.revenue / totalRev * 100) : 0;
    const div = document.createElement('div');
    div.className = 'node';
    div.style.left = leaf.x0 + 'px';
    div.style.top = leaf.y0 + 'px';
    div.style.width = (leaf.x1 - leaf.x0) + 'px';
    div.style.height = (leaf.y1 - leaf.y0) + 'px';
    div.style.background = cagr === null ? '#374151' : cagrColor(cagr);

    const w = leaf.x1 - leaf.x0;
    const h = leaf.y1 - leaf.y0;
    const fs = state.fontScale || 1;
    let lbl = '';
    // 순위 뱃지
    if (w > 40 && h > 25) {
      lbl += '<div class="node-rank">' + rank + '</div>';
    }
    if (w > 50 && h > 30) {
      lbl = '<div class="node-label" style="font-size:' + (16*fs) + 'px">';
      lbl += d.name;
      if (h > 52) lbl += '<span class="revenue" style="font-size:' + (17*fs) + 'px">' + fmt(d.revenue) + '</span>';
      if (h > 75 && w > 80) lbl += '<span class="share" style="font-size:' + (13*fs) + 'px">점유율 ' + share.toFixed(1) + '%</span>';
      if (h > 95 && cagr !== null) lbl += '<span class="growth" style="font-size:' + (15*fs) + 'px">CAGR ' + cagrSign(cagr) + '</span>';
      lbl += '</div>';
    }
    div.innerHTML = lbl;
    div.style.cursor = canDrillDown() ? 'pointer' : 'default';
    div.onclick = () => handleClick(d);
    div.onmouseenter = (e) => showTooltip(e, d, totalRev);
    div.onmousemove = (e) => moveTooltip(e);
    div.onmouseleave = hideTooltip;
    container.appendChild(div);
  });
  updateBreadcrumb();
}

function canDrillDown() {
  if (state.platform === 'steam') return false;
  if (state.view === 'genre' && state.filter === 'all') return true;
  if (state.view === 'country' && state.filter === 'all') return true;
  if (state.view === 'genre' && state.filter !== 'all') return true;
  return false;
}
function handleClick(d) {
  if (!canDrillDown()) return;
  const en = d.nameEn || d.name;
  if (state.view === 'genre' && state.filter === 'all') {
    state.view = 'country'; state.filter = en;
    updateButtons(); updateFilters(); render(); return;
  }
  if (state.view === 'country' && state.filter === 'all') {
    state.view = 'genre'; state.filter = en;
    updateButtons(); updateFilters(); render(); return;
  }
  if (state.view === 'genre' && state.filter !== 'all') {
    state.view = 'subgenre'; state.filter = en;
    updateButtons(); updateFilters(); render(); return;
  }
}

function updateBreadcrumb() {
  const S = '<span class="bc-sep">\u203A</span>';
  const reset = '<span onclick="resetView()">전체</span>';
  let bc = reset;
  const fn = COUNTRY_MAP[state.filter] || state.filter;
  if (state.view === 'genre' && state.filter === 'all') {
    bc += S + '장르별 (글로벌)';
  } else if (state.view === 'genre' && state.filter !== 'all') {
    bc += S + fn + S + '장르별 분포';
  } else if (state.view === 'country' && state.filter === 'all') {
    bc += S + '국가별 (글로벌)';
  } else if (state.view === 'country' && state.filter !== 'all') {
    bc += S + fn + S + '국가별 분포';
  } else if (state.view === 'subgenre' && state.filter === 'all') {
    bc += S + '서브장르 (글로벌)';
  } else if (state.view === 'subgenre' && state.filter !== 'all') {
    bc += S + fn + S + '서브장르 분포';
  }
  bc += '<span class="bc-year">(' + state.year + ')</span>';
  document.getElementById('breadcrumb').innerHTML = bc;
  // 뒤로가기 버튼: 드릴다운 상태에서만 표시
  const backBtn = document.getElementById('back-btn');
  if (backBtn) {
    const isDrilled = state.filter !== 'all' || state.view !== 'genre';
    backBtn.className = isDrilled && state.platform === 'mobile' ? 'visible' : '';
    if (state.view === 'subgenre' && state.filter !== 'all') {
      backBtn.textContent = '← 전체 장르';
      backBtn.onclick = () => { state.view = 'genre'; state.filter = 'all'; updateButtons(); updateFilters(); render(); };
    } else if (state.view === 'country' && state.filter !== 'all') {
      backBtn.textContent = '← 전체 장르';
      backBtn.onclick = () => resetView();
    } else if (state.view === 'genre' && state.filter !== 'all') {
      backBtn.textContent = '← 전체 (글로벌)';
      backBtn.onclick = () => resetView();
    } else if (state.view === 'country' && state.filter === 'all') {
      backBtn.textContent = '← 장르별';
      backBtn.onclick = () => resetView();
    } else {
      backBtn.onclick = () => resetView();
    }
  }
}

function resetView() {
  state.filter = 'all'; state.view = 'genre';
  updateButtons(); updateFilters(); render();
}

function updateButtons() {
  document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + state.platform).classList.add('active');
  document.getElementById('btn-' + state.view).classList.add('active');
  document.getElementById('btn-cagr' + state.cagrPeriod).classList.add('active');
  document.getElementById('btn-' + state.currency).classList.add('active');
  // 스팀은 장르별 데이터만 존재 — 국가별/서브장르 버튼 비활성화
  const isSteam = state.platform === 'steam';
  const btnCountry = document.getElementById('btn-country');
  const btnSubgenre = document.getElementById('btn-subgenre');
  btnCountry.disabled = isSteam;
  btnSubgenre.disabled = isSteam;
  btnCountry.style.opacity = isSteam ? '0.35' : '1';
  btnSubgenre.style.opacity = isSteam ? '0.35' : '1';
  btnCountry.style.cursor = isSteam ? 'not-allowed' : 'pointer';
  btnSubgenre.style.cursor = isSteam ? 'not-allowed' : 'pointer';
  btnCountry.title = isSteam ? '스팀은 장르별만 제공' : '';
  btnSubgenre.title = isSteam ? '스팀은 장르별만 제공' : '';
}

function showTooltip(e, d, totalRev) {
  const tip = document.getElementById('tooltip');
  const cagr = getCagr(d);
  const years = d.yearly || {};
  const yearKeys = Object.keys(years).sort();
  const share = totalRev > 0 ? (d.revenue / totalRev * 100).toFixed(1) : '0.0';

  let sparkHtml = '';
  if (yearKeys.length > 1) {
    sparkHtml = '<div class="sparkline">';
    const maxR = Math.max(...Object.values(years));
    for (const y of yearKeys) {
      const h = Math.max(5, (years[y] / maxR) * 55);
      const color = y === state.year ? '#3b82f6' : '#475569';
      sparkHtml += '<div class="spark-col">' +
        '<div class="spark-val">' + fmtCompact(years[y]) + '</div>' +
        '<div class="spark-bar" style="width:36px;height:' + h + 'px;background:' + color + '"></div>' +
        '<div class="spark-yr">' + y.slice(2) + '</div></div>';
    }
    sparkHtml += '</div>';
  }

  // Top 10 게임 테이블 (CSV 데이터 기반)
  let gamesHtml = '';
  const genreKey = state.year + '_' + (d.nameEn || d.name);
  const topList = (typeof TOP_GAMES !== 'undefined') ? TOP_GAMES[genreKey] : null;
  if (topList && topList.length > 0) {
    gamesHtml = '<div class="top-games"><div class="top-games-title">\uD83C\uDFC6 ' + state.year + ' 매출 Top 10</div>';
    gamesHtml += '<table class="tg-table"><thead><tr><th>#</th><th></th><th>게임</th><th class="r">매출</th><th class="r">다운로드</th><th class="r">DAU</th></tr></thead><tbody>';
    for (let i = 0; i < topList.length; i++) {
      const g = topList[i];
      const rc = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
      const rev = fmt(g.r);
      const dl = g.d >= 1e6 ? (g.d/1e6).toFixed(1) + 'M' : g.d >= 1e3 ? Math.round(g.d/1e3) + 'K' : g.d > 0 ? g.d.toString() : '-';
      const dau = g.u >= 1e6 ? (g.u/1e6).toFixed(1) + 'M' : g.u >= 1e3 ? Math.round(g.u/1e3) + 'K' : g.u > 0 ? g.u.toString() : '-';
      gamesHtml += '<tr><td><span class="tg-rank ' + rc + '">' + (i+1) + '</span></td>';
      const iconUrl = (typeof APP_ICONS !== 'undefined') ? APP_ICONS[g.n] : null;
      gamesHtml += '<td>' + (iconUrl ? '<img src="' + iconUrl + '" width="28" height="28" style="border-radius:6px;vertical-align:middle" loading="lazy" onerror="this.style.display=\'none\'">' : '<div style="width:28px;height:28px;border-radius:6px;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94a3b8">—</div>') + '</td>';
      gamesHtml += '<td class="tg-name">' + g.n + '</td>';
      gamesHtml += '<td class="r tg-rev">' + rev + '</td>';
      gamesHtml += '<td class="r tg-dl">' + dl + '</td>';
      gamesHtml += '<td class="r tg-dau">' + dau + '</td></tr>';
    }
    gamesHtml += '</tbody></table></div>';
  }

  let parentHtml = '';
  if (d.parentKr) {
    parentHtml = '<div class="row"><span class="label">상위 장르</span><span class="value">' + d.parentKr + '</span></div>';
  }

  const hasGames = gamesHtml.length > 0;
  const leftContent = '<div class="' + (hasGames ? 'tg-left' : '') + '">' +
    '<h3>' + d.name + '</h3>' +
    '<div class="row"><span class="label">' + state.year + ' 매출</span><span class="value">' + fmt(d.revenue) + '</span></div>' +
    '<div class="row"><span class="label">시장 점유율</span><span class="value">' + share + '%</span></div>' +
    (cagr !== null
      ? '<div class="row"><span class="label">CAGR (' + getCagrLabel(d) + ')</span><span class="value" style="color:' + (cagr>=0?'#4ade80':'#f87171') + '">' + cagrSign(cagr) + '</span></div>'
      : '<div class="row"><span class="label">CAGR</span><span class="value" style="color:#94a3b8">N/A</span></div>') +
    parentHtml + sparkHtml + '</div>';

  if (hasGames) {
    tip.innerHTML = '<div class="tg-layout">' + leftContent + '<div class="tg-right">' + gamesHtml + '</div></div>';
  } else {
    tip.innerHTML = leftContent;
  }
  tip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  let x = e.clientX + 18, y = e.clientY + 18;
  if (x + 840 > window.innerWidth) x = e.clientX - 860;
  if (y + 450 > window.innerHeight) y = e.clientY - 460;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}

function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function setPlatform(p) {
  state.platform = p; state.filter = 'all';
  if (p === 'steam') state.view = 'genre';
  const badge = document.getElementById('source-badge');
  if (p === 'steam') {
    badge.innerHTML = '<strong>출처:</strong> VG Insights / SteamDB 2021-2025 (Steam 플랫폼 한정, 장르별 매출 추정치, 소비자 지출 기준)';
  } else {
    badge.innerHTML = '<strong>출처:</strong> Sensor Tower 2021-2025 (iOS+Google Play IAP, Google 중국 제외, 스토어 수수료 ~30% 차감 후 순매출)';
  }
  updateButtons(); updateFilters(); render();
}

function setView(v) {
  state.view = v; state.filter = 'all';
  updateButtons(); updateFilters(); render();
}

function setCagrPeriod(n) {
  state.cagrPeriod = n;
  [1,2,3,4].forEach(i => {
    document.getElementById('btn-cagr'+i).classList.toggle('active', i===n);
  });
  render();
}
function updateCagrButtons() {
  const endYear = parseInt(state.year);
  const maxSpan = endYear - 2021;
  [1,2,3,4].forEach(i => {
    const btn = document.getElementById('btn-cagr'+i);
    const available = i <= maxSpan;
    btn.disabled = !available;
    btn.style.opacity = available ? '1' : '0.35';
    btn.style.cursor = available ? 'pointer' : 'not-allowed';
  });
  // 현재 선택 기간이 불가능하면 가능한 최대로 자동 조정
  if (state.cagrPeriod > maxSpan) {
    state.cagrPeriod = Math.max(1, maxSpan);
    [1,2,3,4].forEach(i => {
      document.getElementById('btn-cagr'+i).classList.toggle('active', i===state.cagrPeriod);
    });
  }
  // 2021년이면 전부 비활성
  if (maxSpan <= 0) {
    state.cagrPeriod = 4; // 폴백 (null 반환됨)
  }
}

function setFontScale(s) {
  state.fontScale = s;
  document.documentElement.style.setProperty('--fs', s);
  document.getElementById('btn-fs-s').classList.toggle('active', s===1);
  document.getElementById('btn-fs-m').classList.toggle('active', s===1.25);
  document.getElementById('btn-fs-l').classList.toggle('active', s===1.5);
  render();
}

function setCurrency(c) {
  state.currency = c;
  document.getElementById('btn-usd').classList.toggle('active', c==='usd');
  document.getElementById('btn-krw').classList.toggle('active', c==='krw');
  document.getElementById('fx-group').style.display = c === 'krw' ? 'flex' : 'none';
  render();
}

updateFilters(); render();
window.addEventListener('resize', render);

    desc: '성장률을 <b>1년/2년/3년/4년</b> 단위로\n볼 수 있습니다.\n\n최근 1년 추세가 궁금하면 1년,\n장기 트렌드가 궁금하면 4년을 선택하세요.\n\n선택한 연도에 따라\n사용 가능한 기간이 자동으로 조정됩니다.',
    pos: 'bottom'
  },
  {
    target: '#currency-group',
    title: '통화 전환',
    desc: '<b>USD(달러)</b>와 <b>KRW(원)</b>를 전환할 수 있습니다.\n\nKRW 선택 시 환율을 직접 입력할 수도 있어\n원화 기준 규모감을 바로 파악할 수 있습니다.',
    pos: 'bottom'
  },
  {
    target: '.legend',
    title: '색상 범례',
    desc: '사각형 색상이 의미하는 <b>성장률(CAGR) 범위</b>입니다.\n\n진한 빨강일수록 큰 폭으로 하락,\n진한 초록일수록 빠르게 성장 중인 시장입니다.',
    pos: 'top'
  },
  {
    target: '#summary-cards',
    title: '시장 요약 카드',
    desc: '현재 보고 있는 뷰의 핵심 지표를\n한눈에 보여줍니다.\n\n<b>전체 시장 규모</b>, <b>1위 장르/국가</b>,\n<b>가장 빠르게 성장/하락</b>하는 항목을\n바로 확인할 수 있습니다.',
    pos: 'bottom'
  },
  {
    target: '#treemap',
    title: '마우스를 올려보세요!',
    desc: '사각형 위에 마우스를 올리면\n<b>상세 정보 팝업</b>이 나타납니다.\n\n매출, 점유율, CAGR은 물론\n<b>연도별 매출 추이 그래프</b>와\n해당 장르의 <b>매출 Top 10 게임</b>(매출·다운로드·DAU)까지\n확인할 수 있습니다.\n\n또한 각 사각형 우상단의 <b>순위 뱃지</b>로\n매출 크기 순서를 바로 파악할 수 있습니다.\n\n이제 자유롭게 탐색해 보세요! 🎮',
    pos: 'center'
  }
];

let tourStep = 0;
let tourActive = false;

function startTour() {
  tourStep = 0;
  tourActive = true;
  document.getElementById('tour-overlay').style.display = 'block';
  document.getElementById('tour-help-btn').style.display = 'none';
  showTourStep();
}

function endTour() {
  tourActive = false;
  document.getElementById('tour-overlay').style.display = 'none';
  document.getElementById('tour-spotlight').style.display = 'none';
  document.getElementById('tour-popover').style.display = 'none';
  document.getElementById('tour-help-btn').style.display = 'flex';
  localStorage.setItem('treemap-tour-done', '1');
}

function showTourStep() {
  if (tourStep >= TOUR_STEPS.length) { endTour(); return; }
  const step = TOUR_STEPS[tourStep];
  const el = document.querySelector(step.target);
  if (!el) { tourStep++; showTourStep(); return; }

  const rect = el.getBoundingClientRect();
  const pad = 6;
  const spot = document.getElementById('tour-spotlight');
  spot.style.display = 'block';
  spot.style.left = (rect.left - pad) + 'px';
  spot.style.top = (rect.top - pad) + 'px';
  spot.style.width = (rect.width + pad*2) + 'px';
  spot.style.height = (rect.height + pad*2) + 'px';

  const pop = document.getElementById('tour-popover');
  pop.style.display = 'block';
  pop.innerHTML =
    '<div class="tour-step-num">STEP ' + (tourStep+1) + ' / ' + TOUR_STEPS.length + '</div>' +
    '<div class="tour-title">' + step.title + '</div>' +
    '<div class="tour-desc">' + step.desc.replace(/\n/g,'<br>') + '</div>' +
    '<div class="tour-btns">' +
      (tourStep > 0 ? '<button class="tour-btn tour-btn-prev" onclick="prevTourStep()">← 이전</button>' : '<span></span>') +
      (tourStep < TOUR_STEPS.length - 1
        ? '<button class="tour-btn tour-btn-next" onclick="nextTourStep()">다음 →</button>'
        : '<button class="tour-btn tour-btn-next" onclick="endTour()">시작하기!</button>') +
    '</div>' +
    '<button class="tour-skip" onclick="endTour()">건너뛰기</button>';

  // 팝오버 위치 계산
  requestAnimationFrame(() => {
    const popRect = pop.getBoundingClientRect();
    let px, py;
    if (step.pos === 'center') {
      px = window.innerWidth/2 - popRect.width/2;
      py = Math.min(rect.top + rect.height/2 - popRect.height/2, window.innerHeight - popRect.height - 20);
      py = Math.max(20, py);
    } else if (step.pos === 'bottom') {
      px = rect.left + rect.width/2 - popRect.width/2;
      py = rect.bottom + pad + 12;
    } else if (step.pos === 'top') {
      px = rect.left + rect.width/2 - popRect.width/2;
      py = rect.top - pad - popRect.height - 12;
    } else if (step.pos === 'left') {
      px = rect.left - popRect.width - pad - 12;
      py = rect.top + rect.height/2 - popRect.height/2;
    } else {
      px = rect.right + pad + 12;
      py = rect.top + rect.height/2 - popRect.height/2;
    }
    // 화면 밖 보정
    px = Math.max(12, Math.min(px, window.innerWidth - popRect.width - 12));
    py = Math.max(12, Math.min(py, window.innerHeight - popRect.height - 12));
    pop.style.left = px + 'px';
    pop.style.top = py + 'px';
  });
}

function nextTourStep() { tourStep++; showTourStep(); }
function prevTourStep() { tourStep = Math.max(0, tourStep-1); showTourStep(); }

// 스크롤 시 스포트라이트/팝오버 위치 재계산
window.addEventListener('scroll', () => {
  if (tourActive) showTourStep();
}, { passive: true });

// ESC 키로 종료
document.addEventListener('keydown', (e) => {
  if (tourActive && e.key === 'Escape') endTour();
  if (tourActive && e.key === 'ArrowRight') nextTourStep();
  if (tourActive && e.key === 'ArrowLeft') prevTourStep();
});

// 첫 방문 시 자동 시작
if (!localStorage.getItem('treemap-tour-done')) {
  setTimeout(startTour, 800);
}
</script>
