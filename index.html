<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 게임 시장 트리맵</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; background:#0a0e1a; color:#e2e8f0; font-size:16px; }
.header { padding:28px 32px 0; }
h1 { font-size:30px; color:#f8fafc; margin-bottom:6px; font-weight:800; }
.subtitle { color:#64748b; font-size:15px; margin-bottom:12px; }

.source-badge { display:inline-block; margin-top:6px; padding:6px 16px; background:#1e293b; border:1px solid #334155; border-radius:8px; font-size:14px; color:#94a3b8; font-weight:600; }
.source-badge strong { color:#e2e8f0; }

.controls { display:flex; gap:14px; padding:14px 32px; flex-wrap:wrap; align-items:center; }
.ctrl-group { display:flex; align-items:center; gap:8px; }
.ctrl-group label { font-size:14px; color:#94a3b8; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
select, button { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:10px 16px; font-size:15px; cursor:pointer; font-family:inherit; }
select:hover, button:hover { border-color:#3b82f6; }
button.active { background:#1e40af; border-color:#3b82f6; color:#fff; }
.btn-group { display:flex; gap:0; }
.btn-group button { border-radius:0; border-right:none; }
.btn-group button:first-child { border-radius:8px 0 0 8px; }
.btn-group button:last-child { border-radius:0 8px 8px 0; border-right:1px solid #334155; }
.btn-group button.active { border-color:#3b82f6; }
input[type=text] { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:10px 16px; font-size:15px; font-family:inherit; width:160px; }
input[type=text]:focus { outline:none; border-color:#3b82f6; }
input[type=number] { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:8px 12px; font-size:14px; font-family:inherit; width:90px; text-align:right; }
input[type=number]:focus { outline:none; border-color:#3b82f6; }

/* 국가 검색 드롭다운 */
.filter-wrapper { position:relative; }
.filter-search { position:relative; }
.filter-dropdown { display:none; position:absolute; top:100%; left:0; width:260px; max-height:320px; overflow-y:auto; background:#1e293b; border:1px solid #334155; border-radius:8px; z-index:50; margin-top:4px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
.filter-dropdown.open { display:block; }
.filter-dropdown .fd-item { padding:10px 16px; cursor:pointer; font-size:14px; border-bottom:1px solid #1a2332; }
.filter-dropdown .fd-item:hover { background:#334155; }
.filter-dropdown .fd-item.active { background:#1e40af; color:#fff; }
.filter-dropdown .fd-group { padding:6px 16px; font-size:12px; color:#64748b; font-weight:700; text-transform:uppercase; background:#0f172a; }

#treemap { width:100%; height:calc(100vh - 280px); min-height:500px; background:#111827; border-radius:12px; overflow:hidden; position:relative; }
.treemap-container { padding:16px 32px; }

.node { position:absolute; overflow:hidden; border:1px solid rgba(0,0,0,0.3); transition:opacity .15s; cursor:pointer; }
.node:hover { opacity:.85; z-index:10; border-color:rgba(255,255,255,0.5); }
.node-label { padding:10px 12px; font-size:16px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.9); pointer-events:none; line-height:1.4; }
.node-label .revenue { font-size:17px; font-weight:800; display:block; margin-top:4px; }
.node-label .growth { font-size:15px; display:block; margin-top:3px; opacity:.9; }
.node-label .share { font-size:13px; display:block; margin-top:2px; opacity:.7; }

.legend { display:flex; gap:16px; padding:10px 32px; align-items:center; flex-wrap:wrap; }
.legend-title { font-size:15px; color:#64748b; font-weight:700; }
.legend-bar { display:flex; height:20px; width:320px; border-radius:4px; overflow:hidden; }
.legend-bar div { flex:1; }
.legend-labels { display:flex; justify-content:space-between; width:320px; font-size:13px; color:#64748b; margin-top:2px; }

#tooltip { display:none; position:fixed; background:#1e293b; border:1px solid #475569; border-radius:12px; padding:18px 22px; font-size:15px; z-index:100; pointer-events:none; box-shadow:0 8px 32px rgba(0,0,0,.6); max-width:450px; min-width:300px; }
#tooltip h3 { font-size:18px; color:#f8fafc; margin-bottom:10px; font-weight:800; }
#tooltip .row { display:flex; justify-content:space-between; margin:5px 0; font-size:15px; }
#tooltip .row .label { color:#94a3b8; }
#tooltip .row .value { color:#e2e8f0; font-weight:700; }
#tooltip .games { margin-top:10px; padding-top:10px; border-top:1px solid #334155; font-size:14px; color:#94a3b8; line-height:1.6; }
#tooltip .games strong { color:#e2e8f0; font-size:14px; }
#tooltip .sparkline { margin-top:12px; }
#tooltip .spark-col { display:inline-block; text-align:center; margin-right:4px; vertical-align:bottom; }
#tooltip .spark-bar { display:block; margin:0 auto 2px; border-radius:2px; min-height:4px; }
#tooltip .spark-val { font-size:11px; color:#94a3b8; font-weight:600; white-space:nowrap; }
#tooltip .spark-yr { font-size:11px; color:#64748b; }

.breadcrumb { padding:6px 32px; font-size:15px; color:#64748b; }
.breadcrumb span { cursor:pointer; color:#3b82f6; font-weight:600; }
.breadcrumb span:hover { text-decoration:underline; }

.stats { display:flex; gap:28px; padding:0 32px 10px; flex-wrap:wrap; }
.stat { font-size:15px; color:#94a3b8; }
.stat strong { color:#e2e8f0; font-size:18px; }

.note { padding:4px 32px; font-size:14px; color:#475569; }

/* 시장 요약 카드 */
.summary-cards { display:flex; gap:12px; padding:8px 32px 4px; flex-wrap:wrap; }
.summary-card { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:12px 18px; min-width:160px; }
.summary-card .sc-label { font-size:12px; color:#64748b; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
.summary-card .sc-value { font-size:20px; font-weight:800; color:#f8fafc; }
.summary-card .sc-sub { font-size:13px; color:#94a3b8; margin-top:2px; }

/* Top 5 하이라이트 */
.top5 { display:none; padding:6px 32px; }
.top5.visible { display:flex; gap:8px; flex-wrap:wrap; }
.top5-chip { background:#1e293b; border:1px solid #334155; border-radius:20px; padding:6px 14px; font-size:13px; display:flex; align-items:center; gap:6px; }
.top5-rank { background:#3b82f6; color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; }
.top5-name { color:#e2e8f0; font-weight:600; }
.top5-rev { color:#94a3b8; }
</style>
</head>

<div class="header">
  <h1>글로벌 게임 시장 인터랙티브 트리맵</h1>
  <p class="subtitle">사각형 크기 = 매출 규모 | 색상 = CAGR (초록=성장, 빨강=하락) | 클릭으로 드릴다운</p>
  <div id="source-badge" class="source-badge"><strong>출처:</strong> Sensor Tower 2021-2025 (모바일 앱 매출, iOS+Google Play) · 스토어 수수료(30%) 차감 후 순매출 기준 — 실제 소비자 지출은 약 1.43배</div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>플랫폼</label>
    <div class="btn-group">
      <button id="btn-mobile" class="active" onclick="setPlatform('mobile')">모바일</button>
      <button id="btn-steam" onclick="setPlatform('steam')">스팀/PC</button>
    </div>
  </div>
  <div class="ctrl-group">
    <label>기준</label>
    <div class="btn-group">
      <button id="btn-genre" class="active" onclick="setView('genre')">장르별</button>
      <button id="btn-country" onclick="setView('country')">국가별</button>
      <button id="btn-subgenre" onclick="setView('subgenre')">서브장르</button>
    </div>
  </div>
  <div class="ctrl-group filter-wrapper" id="filter-group">
    <label>필터</label>
    <div class="filter-search">
      <input type="text" id="filter-input" placeholder="전체 (글로벌)" autocomplete="off"
        onfocus="openFilterDropdown()" oninput="filterDropdownSearch(this.value)">
      <div class="filter-dropdown" id="filter-dropdown"></div>
    </div>
  </div>
  <div class="ctrl-group">
    <label>연도</label>
    <select id="year-select" onchange="render()">
      <option value="2025" selected>2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
      <option value="2021">2021</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>CAGR 기간</label>
    <div class="btn-group">
      <button id="btn-cagr4" class="active" onclick="setCagrPeriod(4)">4년</button>
      <button id="btn-cagr2" onclick="setCagrPeriod(2)">2년</button>
    </div>
  </div>
  <div class="ctrl-group">
    <label>통화</label>
    <div class="btn-group">
      <button id="btn-usd" class="active" onclick="setCurrency('usd')">USD ($)</button>
      <button id="btn-krw" onclick="setCurrency('krw')">KRW (₩)</button>
    </div>
  </div>
  <div class="ctrl-group" id="fx-group" style="display:none">
    <label>환율</label>
    <input type="number" id="fx-rate" value="1400" min="100" max="9999" step="10" onchange="render()">
    <span style="font-size:13px;color:#64748b">원/달러</span>
  </div>
</div>

<div class="legend">
  <span class="legend-title">CAGR (연평균 성장률)</span>
  <div>
    <div class="legend-bar">
      <div style="background:#991b1b"></div>
      <div style="background:#dc2626"></div>
      <div style="background:#f87171"></div>
      <div style="background:#6b7280"></div>
      <div style="background:#4ade80"></div>
      <div style="background:#16a34a"></div>
      <div style="background:#166534"></div>
    </div>
    <div class="legend-labels">
      <span>-50%</span><span>-20%</span><span>0%</span><span>+20%</span><span>+50%+</span>
    </div>
  </div>
</div>

<div class="summary-cards" id="summary-cards"></div>
<div class="breadcrumb" id="breadcrumb"></div>
<div class="stats" id="stats"></div>
<div class="top5 visible" id="top5"></div>
<div class="note" id="note"></div>

<div class="treemap-container">
  <div id="treemap"></div>
</div>

<div id="tooltip"></div>

function getFx() {
  if (state.currency === 'usd') return 1;
  return parseFloat(document.getElementById('fx-rate').value) || 1400;
}

function fmt(n) {
  const fx = getFx();
  const v = n * fx;
  if (state.currency === 'krw') {
    if (v >= 1e12) return (v/1e12).toFixed(1) + '조원';
    if (v >= 1e8) return (v/1e8).toFixed(0) + '억원';
    if (v >= 1e4) return (v/1e4).toFixed(0) + '만원';
    return Math.round(v) + '원';
  }
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + Math.round(v);
}

function fmtCompact(n) {
  const fx = getFx();
  const v = n * fx;
  if (state.currency === 'krw') {
    if (v >= 1e12) return (v/1e12).toFixed(1) + '조';
    if (v >= 1e8) return (v/1e8).toFixed(0) + '억';
    return (v/1e6).toFixed(0) + 'M';
  }
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  return '$' + (v/1e3).toFixed(0) + 'K';
}

function cagrColor(cagr) {
  if (cagr <= -40) return '#7f1d1d';
  if (cagr <= -20) return '#991b1b';
  if (cagr <= -10) return '#dc2626';
  if (cagr <= -3) return '#ef4444';
  if (cagr <= 3) return '#6b7280';
  if (cagr <= 10) return '#22c55e';
  if (cagr <= 20) return '#16a34a';
  if (cagr <= 40) return '#15803d';
  return '#166534';
}

function cagrSign(c) { return c >= 0 ? '+' + c.toFixed(1) + '%' : c.toFixed(1) + '%'; }
function getCagr(d) { return state.cagrPeriod === 4 ? (d.cagr4 || d.cagr || 0) : (d.cagr2 || d.cagr || 0); }

function getTreemapData() {
  const year = state.year;
  let items = [];

  if (state.platform === 'mobile') {
    if (state.view === 'genre') {
      if (state.filter === 'all') {
        items = DATA.mobile_genres.map(d => ({
          name: d.name_kr || d.name, nameEn: d.name,
          revenue: d.yearly[year] || 0, cagr4: d.cagr4, cagr2: d.cagr2,
          yearly: d.yearly, games: d.games || ''
        }));
      } else {
        items = DATA.mobile_genre_country
          .filter(d => d.country === state.filter)
          .map(d => ({
            name: d.genre_kr || d.genre, nameEn: d.genre,
            revenue: d.yearly[year] || 0, cagr4: d.cagr4, cagr2: d.cagr2,
            yearly: d.yearly, games: ''
          }));
      }
    } else if (state.view === 'country') {
      if (state.filter === 'all') {
        items = DATA.mobile_countries.map(d => ({
          name: d.name, nameEn: d.country,
          revenue: d.yearly[year] || 0, cagr4: d.cagr4, cagr2: d.cagr2,
          yearly: d.yearly, games: ''
        }));
      } else {
        items = DATA.mobile_genre_country
          .filter(d => d.genre === state.filter)
          .map(d => ({
            name: d.country_name, nameEn: d.country,
            revenue: d.yearly[year] || 0, cagr4: d.cagr4, cagr2: d.cagr2,
            yearly: d.yearly, games: ''
          }));
      }
    } else if (state.view === 'subgenre') {
      const src = state.filter === 'all'
        ? DATA.mobile_subgenres
        : DATA.mobile_subgenres.filter(d => d.genre === state.filter);
      items = src.map(d => ({
        name: d.name_kr || d.name, nameEn: d.name, parent: d.genre,
        parentKr: d.genre_kr || d.genre,
        revenue: d.yearly[year] || 0, cagr4: d.cagr4, cagr2: d.cagr2,
        yearly: d.yearly, games: d.games || ''
      }));
    }
  } else {
    items = DATA.steam_genres.map(d => ({
      name: d.name_kr || d.name, nameEn: d.name,
      revenue: d.yearly[year] || 0, cagr4: d.cagr4, cagr2: d.cagr2,
      yearly: d.yearly, games: d.games || ''
    }));
  }

  return items.filter(d => d.revenue > 0).sort((a,b) => b.revenue - a.revenue);
}

// === 국가 검색 필터 ===
function buildFilterOptions() {
  filterOptions = [];
  if (state.platform === 'steam') return;

  if (state.view === 'genre' || state.view === 'subgenre') {
    const major = ['US','CN','JP','KR','DE','GB','FR','BR','IN','SA','TW','ID','TH'];
    filterOptions.push({ type:'group', label:'주요국' });
    for (const cc of major) {
      const cn = COUNTRY_MAP[cc];
      if (cn) filterOptions.push({ value: cc, label: cn + ' (' + cc + ')', search: cn + cc });
    }
    filterOptions.push({ type:'group', label:'기타' });
    const used = new Set(major);
    Object.entries(COUNTRY_MAP).filter(([c]) => !used.has(c) && c!=='OT').sort((a,b)=>a[1].localeCompare(b[1],'ko'))
      .forEach(([cc,cn]) => { filterOptions.push({ value: cc, label: cn + ' (' + cc + ')', search: cn + cc }); });
  } else if (state.view === 'country') {
    const genres = [...new Set(DATA.mobile_genre_country.map(d => d.genre))].sort();
    for (const g of genres) {
      const kr = DATA.mobile_genres.find(d => d.name === g);
      const label = kr ? kr.name_kr : g;
      filterOptions.push({ value: g, label: label, search: label + g });
    }
  }
}

function openFilterDropdown() {
  buildFilterOptions();
  renderFilterDropdown('');
  document.getElementById('filter-dropdown').classList.add('open');
}

function renderFilterDropdown(query) {
  const dd = document.getElementById('filter-dropdown');
  const q = query.toLowerCase();
  let html = '<div class="fd-item' + (state.filter==='all'?' active':'') + '" onclick="selectFilter(\'all\',\'전체 (글로벌)\')">전체 (글로벌)</div>';
  for (const opt of filterOptions) {
    if (opt.type === 'group') {
      if (!q) html += '<div class="fd-group">' + opt.label + '</div>';
      continue;
    }
    if (q && !opt.search.toLowerCase().includes(q)) continue;
    const active = state.filter === opt.value ? ' active' : '';
    html += '<div class="fd-item' + active + '" onclick="selectFilter(\'' + opt.value + '\',\'' + opt.label.replace(/'/g,"\\'") + '\')">' + opt.label + '</div>';
  }
  dd.innerHTML = html;
}

function filterDropdownSearch(val) { renderFilterDropdown(val); }

function selectFilter(val, label) {
  state.filter = val;
  document.getElementById('filter-input').value = label;
  document.getElementById('filter-dropdown').classList.remove('open');
  render();
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.filter-wrapper')) {
    document.getElementById('filter-dropdown').classList.remove('open');
  }
});

function updateFilters() {
  const fg = document.getElementById('filter-group');
  const input = document.getElementById('filter-input');
  if (state.platform === 'steam') { fg.style.display = 'none'; return; }
  fg.style.display = 'flex';
  input.value = state.filter === 'all' ? '전체 (글로벌)' : (COUNTRY_MAP[state.filter] || state.filter);
  buildFilterOptions();
}

function render() {
  state.year = document.getElementById('year-select').value;
  const items = getTreemapData();
  const container = document.getElementById('treemap');
  const width = container.clientWidth;
  const height = container.clientHeight;

  const totalRev = items.reduce((s,d) => s + d.revenue, 0);
  const avgCagr = items.length > 0 ? items.reduce((s,d) => s + getCagr(d) * d.revenue, 0) / totalRev : 0;
  const growing = items.filter(d => getCagr(d) > 0).length;

  // 시장 요약 카드
  const topItem = items[0] || {name:'-',revenue:0};
  const topShare = totalRev > 0 ? (topItem.revenue / totalRev * 100).toFixed(1) : 0;
  const fastestGrowing = [...items].sort((a,b) => getCagr(b) - getCagr(a))[0] || {name:'-'};
  const fastestDecline = [...items].sort((a,b) => getCagr(a) - getCagr(b))[0] || {name:'-'};
  document.getElementById('summary-cards').innerHTML =
    '<div class="summary-card"><div class="sc-label">전체 시장 규모</div><div class="sc-value">' + fmt(totalRev) + '</div><div class="sc-sub">' + state.year + ' 기준</div></div>' +
    '<div class="summary-card"><div class="sc-label">1위</div><div class="sc-value">' + topItem.name + '</div><div class="sc-sub">' + fmt(topItem.revenue) + ' (' + topShare + '%)</div></div>' +
    '<div class="summary-card"><div class="sc-label">최고 성장</div><div class="sc-value" style="color:#4ade80">' + fastestGrowing.name + '</div><div class="sc-sub">' + cagrSign(getCagr(fastestGrowing)) + ' (' + state.cagrPeriod + '년)</div></div>' +
    '<div class="summary-card"><div class="sc-label">최대 하락</div><div class="sc-value" style="color:#f87171">' + fastestDecline.name + '</div><div class="sc-sub">' + cagrSign(getCagr(fastestDecline)) + ' (' + state.cagrPeriod + '년)</div></div>';

  document.getElementById('stats').innerHTML =
    '<div class="stat">가중평균 CAGR <strong style="color:' + (avgCagr>=0?'#4ade80':'#f87171') + '">' + cagrSign(avgCagr) + '</strong> (' + state.cagrPeriod + '년)</div>' +
    '<div class="stat">성장 <strong style="color:#4ade80">' + growing + '</strong> / 하락 <strong style="color:#f87171">' + (items.length-growing) + '</strong></div>' +
    '<div class="stat">항목 수 <strong>' + items.length + '</strong></div>';

  // Top 5 칩
  const top5El = document.getElementById('top5');
  const top5 = items.slice(0,5);
  top5El.innerHTML = top5.map((d,i) =>
    '<div class="top5-chip"><span class="top5-rank">' + (i+1) + '</span><span class="top5-name">' + d.name + '</span><span class="top5-rev">' + fmt(d.revenue) + '</span></div>'
  ).join('');
  top5El.classList.toggle('visible', items.length > 3);

  // 스팀 노트
  document.getElementById('note').innerHTML = state.platform === 'steam'
    ? '※ 스팀 "액션/슈터"에는 CS2, PUBG, CoD 등 슈터 장르 포함. Early Access, Indie 태그는 장르가 아니므로 제외.'
    : '';

  const root = d3.hierarchy({ children: items.map(d => ({ ...d, value: d.revenue })) })
    .sum(d => d.value || 0).sort((a,b) => b.value - a.value);

  d3.treemap().size([width, height]).padding(2).round(true)(root);
  container.innerHTML = '';

  root.leaves().forEach(leaf => {
    const d = leaf.data;
    const cagr = getCagr(d);
    const share = totalRev > 0 ? (d.revenue / totalRev * 100) : 0;
    const div = document.createElement('div');
    div.className = 'node';
    div.style.left = leaf.x0 + 'px';
    div.style.top = leaf.y0 + 'px';
    div.style.width = (leaf.x1 - leaf.x0) + 'px';
    div.style.height = (leaf.y1 - leaf.y0) + 'px';
    div.style.background = cagrColor(cagr);

    const w = leaf.x1 - leaf.x0;
    const h = leaf.y1 - leaf.y0;
    let lbl = '';
    if (w > 50 && h > 30) {
      lbl = '<div class="node-label">';
      lbl += w > 90 ? d.name : d.name.substring(0,5);
      if (h > 52) lbl += '<span class="revenue">' + fmt(d.revenue) + '</span>';
      if (h > 75) lbl += '<span class="growth">' + cagrSign(cagr) + '</span>';
      if (h > 95 && w > 80) lbl += '<span class="share">' + share.toFixed(1) + '%</span>';
      lbl += '</div>';
    }
    div.innerHTML = lbl;
    div.onclick = () => handleClick(d);
    div.onmouseenter = (e) => showTooltip(e, d, totalRev);
    div.onmousemove = (e) => moveTooltip(e);
    div.onmouseleave = hideTooltip;
    container.appendChild(div);
  });
  updateBreadcrumb();
}

function handleClick(d) {
  if (state.platform === 'steam') return;
  const en = d.nameEn || d.name;
  if (state.view === 'genre' && state.filter === 'all') {
    state.view = 'country'; state.filter = en;
    updateButtons(); updateFilters(); render(); return;
  }
  if (state.view === 'country' && state.filter === 'all') {
    state.view = 'genre'; state.filter = en;
    updateButtons(); updateFilters(); render(); return;
  }
  if (state.view === 'genre' && state.filter !== 'all') {
    state.view = 'subgenre'; state.filter = en;
    updateButtons(); updateFilters(); render(); return;
  }
}

function updateBreadcrumb() {
  const reset = '<span onclick="resetView()">전체</span>';
  let bc = reset;
  if (state.filter !== 'all') {
    const fn = COUNTRY_MAP[state.filter] || state.filter;
    bc += ' \u203A ' + fn;
  } else {
    const viewNames = {genre:'장르별', country:'국가별', subgenre:'서브장르'};
    bc += ' \u203A ' + (viewNames[state.view] || state.view);
  }
  document.getElementById('breadcrumb').innerHTML = bc;
}

function resetView() {
  state.filter = 'all'; state.view = 'genre';
  updateButtons(); updateFilters(); render();
}

function updateButtons() {
  document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + state.platform).classList.add('active');
  document.getElementById('btn-' + state.view).classList.add('active');
  document.getElementById('btn-cagr' + state.cagrPeriod).classList.add('active');
  document.getElementById('btn-' + state.currency).classList.add('active');
}

function showTooltip(e, d, totalRev) {
  const tip = document.getElementById('tooltip');
  const cagr = getCagr(d);
  const years = d.yearly || {};
  const yearKeys = Object.keys(years).sort();
  const share = totalRev > 0 ? (d.revenue / totalRev * 100).toFixed(1) : '0.0';

  let sparkHtml = '';
  if (yearKeys.length > 1) {
    sparkHtml = '<div class="sparkline">';
    const maxR = Math.max(...Object.values(years));
    for (const y of yearKeys) {
      const h = Math.max(5, (years[y] / maxR) * 55);
      const color = y === state.year ? '#3b82f6' : '#475569';
      sparkHtml += '<div class="spark-col">' +
        '<div class="spark-val">' + fmtCompact(years[y]) + '</div>' +
        '<div class="spark-bar" style="width:36px;height:' + h + 'px;background:' + color + '"></div>' +
        '<div class="spark-yr">' + y.slice(2) + '</div></div>';
    }
    sparkHtml += '</div>';
  }

  let gamesHtml = '';
  if (d.games) {
    gamesHtml = '<div class="games"><strong>\uD83C\uDFAE 대표 게임:</strong> ' + d.games + '</div>';
  }

  let parentHtml = '';
  if (d.parentKr) {
    parentHtml = '<div class="row"><span class="label">상위 장르</span><span class="value">' + d.parentKr + '</span></div>';
  }

  tip.innerHTML =
    '<h3>' + d.name + '</h3>' +
    '<div class="row"><span class="label">' + state.year + ' 매출</span><span class="value">' + fmt(d.revenue) + '</span></div>' +
    '<div class="row"><span class="label">시장 점유율</span><span class="value">' + share + '%</span></div>' +
    '<div class="row"><span class="label">CAGR (' + state.cagrPeriod + '년)</span><span class="value" style="color:' + (cagr>=0?'#4ade80':'#f87171') + '">' + cagrSign(cagr) + '</span></div>' +
    parentHtml + gamesHtml + sparkHtml;
  tip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  let x = e.clientX + 18, y = e.clientY + 18;
  if (x + 450 > window.innerWidth) x = e.clientX - 470;
  if (y + 350 > window.innerHeight) y = e.clientY - 360;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}

function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function setPlatform(p) {
  state.platform = p; state.filter = 'all';
  if (p === 'steam') state.view = 'genre';
  const badge = document.getElementById('source-badge');
  if (p === 'steam') {
    badge.innerHTML = '<strong>출처:</strong> VG Insights / SteamDB 2021-2025 (Steam 총 매출 추정치, 스토어 수수료 차감 전)';
  } else {
    badge.innerHTML = '<strong>출처:</strong> Sensor Tower 2021-2025 (모바일 앱 매출, iOS+Google Play) · 스토어 수수료(30%) 차감 후 순매출 기준 — 실제 소비자 지출은 약 1.43배';
  }
  updateButtons(); updateFilters(); render();
}

function setView(v) {
  state.view = v; state.filter = 'all';
  updateButtons(); updateFilters(); render();
}

function setCagrPeriod(n) {
  state.cagrPeriod = n;
  document.getElementById('btn-cagr4').classList.toggle('active', n===4);
  document.getElementById('btn-cagr2').classList.toggle('active', n===2);
  render();
}

function setCurrency(c) {
  state.currency = c;
  document.getElementById('btn-usd').classList.toggle('active', c==='usd');
  document.getElementById('btn-krw').classList.toggle('active', c==='krw');
  document.getElementById('fx-group').style.display = c === 'krw' ? 'flex' : 'none';
  render();
}

updateFilters(); render();
window.addEventListener('resize', render);
</script>
</body>
</html>
