const YEARS = ["2021", "2022", "2023", "2024", "2025"];

// ── 상태 ──
const state = {
  view: 'genre',
  topN: 10,
  genre: null,
  currency: 'KRW',
  krwRate: 1400,
  pinned: new Set(),
};

// ── 유틸 ──
function fmtRev(v) {
  if (state.currency === 'KRW') {
    v *= state.krwRate;
    if (v >= 1e12) return (v/1e12).toFixed(1) + '조원';
    if (v >= 1e8) return Math.round(v/1e8).toLocaleString() + '억원';
    if (v >= 1e4) return Math.round(v/1e4).toLocaleString() + '만원';
    return Math.round(v).toLocaleString() + '원';
  }
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + v.toFixed(0);
}
function fmtCount(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return n.toFixed(0);
}

// 선 고유 색상 팔레트 — 장르/게임 구분용
const LINE_PALETTE = [
  '#3b82f6','#f59e0b','#10b981','#ef4444','#a855f7',
  '#ec4899','#06b6d4','#f97316','#84cc16','#6366f1',
  '#14b8a6','#e879f9','#facc15','#fb923c','#22d3ee',
  '#4ade80','#c084fc','#f472b6','#a3e635','#38bdf8',
  '#fbbf24','#2dd4bf','#818cf8','#fb7185','#34d399',
  '#c4b5fd','#fca5a5','#67e8f9','#bef264','#fda4af'
];
function lineColor(idx) { return LINE_PALETTE[idx % LINE_PALETTE.length]; }
function calcCagr(v0, v1, n) {
  if (!v0 || !v1 || v0 <= 0 || v1 <= 0 || n <= 0) return null;
  return (Math.pow(v1 / v0, 1 / n) - 1) * 100;
}
function rankBadge(r) {
  const cls = r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : 'normal';
  return `<span class="tg-rank ${cls}">${r}</span>`;
}

// ── SVG 설정 ──
const margin = { top: 50, right: 180, bottom: 40, left: 180 };
let width, height;
const svg = d3.select('#chart').append('svg');
const g = svg.append('g');

function resize() {
  const container = document.getElementById('chart');
  width = container.clientWidth - margin.left - margin.right;
  const maxRank = state.view === 'genre' ? Object.keys(GENRE_RANKS).length : state.topN;
  height = Math.max(400, maxRank * 48 + 60);
  svg.attr('width', width + margin.left + margin.right)
     .attr('height', height + margin.top + margin.bottom);
  g.attr('transform', `translate(${margin.left},${margin.top})`);
  container.style.height = (height + margin.top + margin.bottom) + 'px';
}

// ── 스케일 ──
let xScale, yScale;
function updateScales(maxRank) {
  xScale = d3.scalePoint().domain(YEARS).range([0, width]).padding(0.1);
  yScale = d3.scaleLinear().domain([1, maxRank]).range([0, height]);
}

// ── 라벨 충돌 회피 ──
function resolveOverlaps(labels, minGap) {
  labels.sort((a, b) => a.y - b.y);
  for (let i = 1; i < labels.length; i++) {
    const diff = labels[i].y - labels[i - 1].y;
    if (diff < minGap) {
      const shift = (minGap - diff) / 2;
      labels[i - 1].y -= shift;
      labels[i].y += shift;
      for (let j = i - 1; j > 0; j--) {
        const d2 = labels[j].y - labels[j - 1].y;
        if (d2 < minGap) labels[j - 1].y = labels[j].y - minGap;
        else break;
      }
    }
  }
  return labels;
}

// ── 메인 렌더 ──
function render() {
  if (state.view === 'genre') renderGenre();
  else renderGame();
}

// ── 장르 범프차트 ──
function renderGenre() {
  state.pinned.clear();
  document.getElementById('sub-controls').classList.remove('visible');
  document.getElementById('back-btn').className = '';
  document.getElementById('breadcrumb').style.display = 'none';

  const genres = Object.keys(GENRE_RANKS);
  const maxRank = genres.length;
  resize();
  updateScales(maxRank);
  g.selectAll('*').remove();

  // X축 (연도)
  g.append('g').attr('class','x-axis')
    .selectAll('text').data(YEARS).enter()
    .append('text')
    .attr('x', d => xScale(d)).attr('y', -16)
    .attr('text-anchor','middle').attr('fill','#94a3b8')
    .attr('font-size', `calc(15px * var(--fs))`).attr('font-weight','700')
    .text(d => d);

  // 수평 가이드라인
  for (let r = 1; r <= maxRank; r++) {
    g.append('line')
      .attr('x1', 0).attr('x2', width)
      .attr('y1', yScale(r)).attr('y2', yScale(r))
      .attr('stroke', '#1e293b').attr('stroke-width', 1);
  }

  // 각 장르 선 + 라벨 (2-pass: 선/점 먼저, 라벨은 충돌 해소 후)
  const line = d3.line()
    .x(d => xScale(d.year))
    .y(d => yScale(d.rank))
    .curve(d3.curveBumpX);

  const labelMinGap = 22 * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fs') || '1.25');
  const genreDrawData = [];

  genres.forEach((gen, gi) => {
    const data = GENRE_RANKS[gen];
    const c = data.cagr;
    const color = lineColor(gi);
    const kr = data.kr || gen;
    const pts = YEARS.map(yr => ({ year: yr, rank: data[yr]?.rank || maxRank, rev: data[yr]?.rev || 0 })).filter(d => d.rev > 0);
    if (pts.length < 2) return;

    const group = g.append('g').attr('class', 'bump-line').attr('data-genre', gen);

    group.append('path').datum(pts).attr('d', line)
      .attr('fill', 'none').attr('stroke', color).attr('stroke-width', 3.5)
      .attr('stroke-linecap', 'round').attr('opacity', 0.85);

    group.selectAll('circle').data(pts).enter().append('circle')
      .attr('cx', d => xScale(d.year)).attr('cy', d => yScale(d.rank))
      .attr('r', 6).attr('fill', color).attr('stroke', '#0a0e1a').attr('stroke-width', 2);

    group.append('path').datum(pts).attr('d', line)
      .attr('fill', 'none').attr('stroke', 'transparent').attr('stroke-width', 20)
      .attr('cursor', 'pointer')
      .on('mouseenter', () => highlightLine(gen))
      .on('mouseleave', () => unhighlightLine(gen))
      .on('mousemove', (ev) => showGenreTooltip(ev, gen))
      .on('click', () => drillDown(gen));

    genreDrawData.push({ gen, color, kr, pts, group });
  });

  const leftLabels = genreDrawData.map(d => ({ y: yScale(d.pts[0].rank), ref: d }));
  resolveOverlaps(leftLabels, labelMinGap);
  leftLabels.forEach(lb => {
    const d = lb.ref;
    d.group.append('text').attr('x', -12).attr('y', lb.y)
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .attr('fill', d.color).attr('font-size', `calc(14px * var(--fs))`).attr('font-weight', '700')
      .attr('cursor', 'pointer').attr('pointer-events', 'all')
      .text(`${d.pts[0].rank}. ${d.kr}`)
      .on('mouseenter', () => highlightLine(d.gen))
      .on('mouseleave', () => unhighlightLine(d.gen))
      .on('mousemove', (ev) => showGenreTooltip(ev, d.gen))
      .on('click', () => drillDown(d.gen));
  });

  const rightLabels = genreDrawData.map(d => ({ y: yScale(d.pts[d.pts.length - 1].rank), ref: d }));
  resolveOverlaps(rightLabels, labelMinGap);
  rightLabels.forEach(lb => {
    const d = lb.ref;
    d.group.append('text').attr('x', width + 12).attr('y', lb.y)
      .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
      .attr('fill', d.color).attr('font-size', `calc(14px * var(--fs))`).attr('font-weight', '700')
      .attr('cursor', 'pointer').attr('pointer-events', 'all')
      .text(`${d.pts[d.pts.length - 1].rank}. ${d.kr}`)
      .on('mouseenter', () => highlightLine(d.gen))
      .on('mouseleave', () => unhighlightLine(d.gen))
      .on('mousemove', (ev) => showGenreTooltip(ev, d.gen))
      .on('click', () => drillDown(d.gen));
  });
}

// ── 게임 범프차트 ──
function renderGame() {
  const gen = state.genre;
  if (!gen || !GAME_YEARLY[gen]) return;

  document.getElementById('sub-controls').classList.add('visible');
  document.getElementById('back-btn').className = 'visible';
  const kr = GENRE_RANKS[gen]?.kr || gen;
  document.getElementById('breadcrumb').style.display = 'block';
  document.getElementById('breadcrumb').innerHTML = `<span onclick="showGenreView()">전체 장르</span> › ${kr} Top ${state.topN}`;

  const games = GAME_YEARLY[gen].filter(g => g.bestRank <= state.topN).slice(0, state.topN);
  const maxRank = state.topN;
  resize();
  updateScales(maxRank);
  g.selectAll('*').remove();

  // X축
  g.append('g').attr('class','x-axis')
    .selectAll('text').data(YEARS).enter()
    .append('text')
    .attr('x', d => xScale(d)).attr('y', -16)
    .attr('text-anchor','middle').attr('fill','#94a3b8')
    .attr('font-size', `calc(15px * var(--fs))`).attr('font-weight','700')
    .text(d => d);

  // 가이드라인
  for (let r = 1; r <= maxRank; r++) {
    g.append('line')
      .attr('x1', 0).attr('x2', width)
      .attr('y1', yScale(r)).attr('y2', yScale(r))
      .attr('stroke', '#1e293b').attr('stroke-width', 1);
  }

  const line = d3.line()
    .x(d => xScale(d.year))
    .y(d => yScale(d.rank))
    .curve(d3.curveBumpX)
    .defined(d => d.rank <= maxRank);

  const gameLabelMinGap = 20 * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fs') || '1.25');
  const gameDrawData = [];

  games.forEach((game, gi) => {
    const pts = YEARS.map(yr => {
      const yd = game.years[yr];
      return { year: yr, rank: yd ? yd.rank : null, rev: yd ? yd.rev : 0, dl: yd ? yd.dl : 0, dau: yd ? yd.dau : 0 };
    }).filter(d => d.rank !== null && d.rank <= maxRank);
    if (pts.length < 1) return;

    const revFirst = pts[0]?.rev || 0;
    const revLast = pts[pts.length - 1]?.rev || 0;
    const span = pts.length > 1 ? parseInt(pts[pts.length-1].year) - parseInt(pts[0].year) : 0;
    const c = span > 0 ? calcCagr(revFirst, revLast, span) : null;
    const color = lineColor(gi);
    const nameKr = game.nameKr;
    const nameEn = game.name;

    const group = g.append('g').attr('class', 'bump-line').attr('data-game', nameEn);

    if (pts.length >= 2) {
      group.append('path').datum(pts).attr('d', line)
        .attr('fill', 'none').attr('stroke', color).attr('stroke-width', 3)
        .attr('stroke-linecap', 'round').attr('opacity', 0.85);
    }

    pts.forEach(pt => {
      const icon = APP_ICONS[nameEn];
      if (icon) {
        group.append('image').attr('href', icon)
          .attr('x', xScale(pt.year) - 14).attr('y', yScale(pt.rank) - 14)
          .attr('width', 28).attr('height', 28)
          .attr('clip-path', 'inset(0% round 6px)').attr('opacity', 0.9);
      } else {
        group.append('circle')
          .attr('cx', xScale(pt.year)).attr('cy', yScale(pt.rank))
          .attr('r', 6).attr('fill', color).attr('stroke', '#0a0e1a').attr('stroke-width', 2);
      }
      // 아이콘/점 위 투명 히트 영역 — 호버 시 툴팁
      group.append('rect')
        .attr('x', xScale(pt.year) - 16).attr('y', yScale(pt.rank) - 16)
        .attr('width', 32).attr('height', 32)
        .attr('fill', 'transparent').attr('cursor', 'pointer')
        .on('mouseenter', () => highlightLine(nameEn, true))
        .on('mouseleave', () => unhighlightLine(nameEn, true))
        .on('mousemove', (ev) => showGameTooltip(ev, game, c))
        .on('click', () => togglePin(nameEn, true));
    });

    if (pts.length >= 2) {
      group.append('path').datum(pts).attr('d', line)
        .attr('fill', 'none').attr('stroke', 'transparent').attr('stroke-width', 20)
        .attr('cursor', 'pointer')
        .on('mouseenter', () => highlightLine(nameEn, true))
        .on('mouseleave', () => unhighlightLine(nameEn, true))
        .on('mousemove', (ev) => showGameTooltip(ev, game, c))
        .on('click', () => togglePin(nameEn, true));
    }
    if (pts.length === 1) {
      group.append('circle')
        .attr('cx', xScale(pts[0].year)).attr('cy', yScale(pts[0].rank))
        .attr('r', 16).attr('fill', 'transparent').attr('cursor', 'pointer')
        .on('mouseenter', () => highlightLine(nameEn, true))
        .on('mouseleave', () => unhighlightLine(nameEn, true))
        .on('mousemove', (ev) => showGameTooltip(ev, game, c))
        .on('click', () => togglePin(nameEn, true));
    }

    gameDrawData.push({ game, color, c, nameKr, nameEn, pts, group });
  });

  // 라벨: 마진 vs 인라인 분리
  const firstYear = YEARS[0], lastYear = YEARS[YEARS.length - 1];
  const marginLeft = gameDrawData.filter(d => d.pts[0].year === firstYear);
  const inlineLeft = gameDrawData.filter(d => d.pts[0].year !== firstYear);
  const marginRight = gameDrawData.filter(d => d.pts[d.pts.length - 1].year === lastYear);
  const inlineRight = gameDrawData.filter(d => d.pts[d.pts.length - 1].year !== lastYear);

  // 마진 왼쪽 라벨
  const gLeftLabels = marginLeft.map(d => ({ y: yScale(d.pts[0].rank), ref: d }));
  resolveOverlaps(gLeftLabels, gameLabelMinGap);
  gLeftLabels.forEach(lb => {
    const d = lb.ref;
    const label = d.nameKr.length > 12 ? d.nameKr.slice(0, 11) + '…' : d.nameKr;
    d.group.append('text').attr('x', -12).attr('y', lb.y)
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .attr('fill', d.color).attr('font-size', `calc(12px * var(--fs))`).attr('font-weight', '600')
      .attr('cursor', 'pointer').attr('pointer-events', 'all')
      .text(`${d.pts[0].rank}. ${label}`)
      .on('mouseenter', () => highlightLine(d.nameEn, true))
      .on('mouseleave', () => unhighlightLine(d.nameEn, true))
      .on('mousemove', (ev) => showGameTooltip(ev, d.game, d.c))
      .on('click', () => togglePin(d.nameEn, true));
  });

  // 인라인 라벨 (등장/퇴장 모두 아이콘 위)
  const allInline = [];
  inlineLeft.forEach(d => {
    const pt = d.pts[0];
    allInline.push({ x: xScale(pt.year), yBase: yScale(pt.rank), yr: pt.year, ref: d });
  });
  inlineRight.forEach(d => {
    const pt = d.pts[d.pts.length - 1];
    allInline.push({ x: xScale(pt.year), yBase: yScale(pt.rank), yr: pt.year, ref: d });
  });
  const inlineByYear = {};
  allInline.forEach(item => {
    if (!inlineByYear[item.yr]) inlineByYear[item.yr] = [];
    inlineByYear[item.yr].push(item);
  });
  Object.values(inlineByYear).forEach(group => {
    const labels = group.map(item => ({ y: item.yBase - 24, ref: item }));
    resolveOverlaps(labels, gameLabelMinGap);
    labels.forEach(lb => {
      const item = lb.ref;
      const d = item.ref;
      const label = d.nameKr.length > 10 ? d.nameKr.slice(0, 9) + '…' : d.nameKr;
      const yr2 = "'" + item.yr.slice(2);
      d.group.append('text').attr('x', item.x).attr('y', lb.y)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'auto')
        .attr('fill', d.color).attr('font-size', `calc(11px * var(--fs))`).attr('font-weight', '600')
        .text(`${label} (${yr2})`);
    });
  });

  // 마진 오른쪽 라벨 (순위 + 이름 + 매출)
  const gRightLabels = marginRight.map(d => ({ y: yScale(d.pts[d.pts.length - 1].rank), ref: d }));
  resolveOverlaps(gRightLabels, gameLabelMinGap);
  gRightLabels.forEach(lb => {
    const d = lb.ref;
    const label = d.nameKr.length > 12 ? d.nameKr.slice(0, 11) + '…' : d.nameKr;
    d.group.append('text').attr('x', width + 12).attr('y', lb.y)
      .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
      .attr('fill', d.color).attr('font-size', `calc(12px * var(--fs))`).attr('font-weight', '600')
      .attr('cursor', 'pointer').attr('pointer-events', 'all')
      .text(`${d.pts[d.pts.length - 1].rank}. ${label}`)
      .on('mouseenter', () => highlightLine(d.nameEn, true))
      .on('mouseleave', () => unhighlightLine(d.nameEn, true))
      .on('mousemove', (ev) => showGameTooltip(ev, d.game, d.c))
      .on('click', () => togglePin(d.nameEn, true));
  });
}

// ── 하이라이트 ──
function highlightLine(id, isGame) {
  const attr = isGame ? 'data-game' : 'data-genre';
  g.selectAll('.bump-line').each(function() {
    const el = d3.select(this);
    const match = el.attr(attr) === id || state.pinned.has(el.attr(attr));
    el.selectAll('path:not([stroke=transparent])').attr('opacity', match ? 1 : 0.15).attr('stroke-width', match ? (isGame ? 4 : 5) : (isGame ? 2 : 2.5));
    el.selectAll('circle').attr('opacity', match ? 1 : 0.15);
    el.selectAll('image').attr('opacity', match ? 1 : 0.15);
    el.selectAll('text').attr('opacity', match ? 1 : 0.15);
  });
}

function unhighlightLine(id, isGame) {
  if (state.pinned.size > 0) {
    highlightLine(null, isGame);
    return;
  }
  g.selectAll('.bump-line').each(function() {
    const el = d3.select(this);
    el.selectAll('path:not([stroke=transparent])').attr('opacity', 0.85).attr('stroke-width', isGame ? 3 : 3.5);
    el.selectAll('circle').attr('opacity', 1);
    el.selectAll('image').attr('opacity', 0.9);
    el.selectAll('text').attr('opacity', 1);
  });
}

function togglePin(id, isGame) {
  if (state.pinned.has(id)) state.pinned.delete(id);
  else state.pinned.add(id);
  if (state.pinned.size > 0) highlightLine(id, isGame);
  else unhighlightLine(id, isGame);
}

// ── 툴팁 ──
const tip = document.getElementById('tooltip');

function showGenreTooltip(ev, gen) {
  const data = GENRE_RANKS[gen];
  const kr = data.kr || gen;
  let html = `<h3>${kr} (${gen})</h3>`;

  // 연도별 매출
  html += '<table class="tg-table" style="margin-top:12px"><tr><th>연도</th><th class="r">순위</th><th class="r">매출</th><th class="r">YoY</th></tr>';
  YEARS.forEach((yr, i) => {
    const d = data[yr];
    if (!d) return;
    const prev = i > 0 ? data[YEARS[i-1]] : null;
    const yoy = prev && prev.rev > 0 ? ((d.rev - prev.rev) / prev.rev * 100) : null;
    const yoyStr = yoy !== null ? (yoy >= 0 ? '+' + yoy.toFixed(1) + '%' : yoy.toFixed(1) + '%') : '—';
    const yoyColor = yoy === null ? '#64748b' : yoy >= 0 ? '#4ade80' : '#ef4444';
    html += `<tr><td>${yr}</td><td class="r">${rankBadge(d.rank)}</td><td class="r" style="color:#4ade80;font-weight:700">${fmtRev(d.rev)}</td><td class="r" style="color:${yoyColor}">${yoyStr}</td></tr>`;
  });
  html += '</table>';

  // Top 5 게임 (최근 연도)
  const lastYr = YEARS[YEARS.length - 1];
  const topKey = `${lastYr}_${gen}`;
  const topGames = GAME_RANKS[topKey];
  if (topGames && topGames.length > 0) {
    html += `<div style="margin-top:12px;padding-top:10px;border-top:1px solid #334155;font-size:calc(13px * var(--fs));color:#94a3b8;font-weight:700;margin-bottom:6px">TOP 10 (${lastYr})</div>`;
    html += '<table class="tg-table"><tr><th>#</th><th>게임</th><th class="r">매출</th></tr>';
    topGames.slice(0, 10).forEach(tg => {
      const icon = APP_ICONS[tg.name] ? `<img class="tg-icon" src="${APP_ICONS[tg.name]}" onerror="this.style.display='none'">` : '';
      html += `<tr><td>${rankBadge(tg.rank)}</td><td>${icon}${tg.nameKr}</td><td class="r" style="color:#4ade80;font-weight:700">${fmtRev(tg.rev)}</td></tr>`;
    });
    html += '</table>';
  }

  tip.innerHTML = html;
  tip.style.display = 'block';
  positionTooltip(ev);
}

function showGameTooltip(ev, game, c) {
  const icon = APP_ICONS[game.name] ? `<img class="tg-icon" src="${APP_ICONS[game.name]}" style="width:32px;height:32px;border-radius:8px;vertical-align:middle;margin-right:8px" onerror="this.style.display='none'">` : '';
  let html = `<h3>${icon}${game.nameKr}</h3>`;
  if (game.nameKr !== game.name) html += `<div style="color:#64748b;font-size:calc(12px * var(--fs));margin-top:-6px;margin-bottom:8px">${game.name}</div>`;

  html += '<table class="tg-table" style="margin-top:10px"><tr><th>연도</th><th class="r">순위</th><th class="r">매출</th><th class="r">DL</th><th class="r">DAU</th></tr>';
  YEARS.forEach(yr => {
    const d = game.years[yr];
    if (!d) return;
    html += `<tr><td>${yr}</td><td class="r">${rankBadge(d.rank)}</td><td class="r" style="color:#4ade80;font-weight:700">${fmtRev(d.rev)}</td><td class="r" style="color:#60a5fa">${fmtCount(d.dl)}</td><td class="r" style="color:#c084fc">${fmtCount(d.dau)}</td></tr>`;
  });
  html += '</table>';

  tip.innerHTML = html;
  tip.style.display = 'block';
  positionTooltip(ev);
}

function positionTooltip(ev) {
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  let x = ev.clientX + 16, y = ev.clientY + 16;
  if (x + tw > window.innerWidth - 20) x = ev.clientX - tw - 16;
  if (y + th > window.innerHeight - 20) y = ev.clientY - th - 16;
  if (y < 8) y = 8;
  if (x < 8) x = 8;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

document.addEventListener('mousemove', (ev) => {
  if (!ev.target.closest('.bump-line') && !ev.target.closest('#tooltip')) {
    tip.style.display = 'none';
  }
});

  state.view = 'game';
  state.genre = gen;
  state.pinned.clear();
  document.querySelectorAll('#view-btns button').forEach(b => b.classList.toggle('active', b.dataset.val === 'game'));
  document.getElementById('genre-select').value = gen;
  render();
}

function showGenreView() {
  state.view = 'genre';
  state.genre = null;
  state.pinned.clear();
  document.querySelectorAll('#view-btns button').forEach(b => b.classList.toggle('active', b.dataset.val === 'genre'));
  render();
}

// ── 컨트롤 바인딩 ──
document.querySelectorAll('#view-btns button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#view-btns button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');

      // 매출 1위 장르로 기본 설정
      const sorted = Object.entries(GENRE_RANKS).sort((a,b) => {
        const aRev = a[1][YEARS[YEARS.length-1]]?.rev || 0;
        const bRev = b[1][YEARS[YEARS.length-1]]?.rev || 0;
        return bRev - aRev;
      });
      state.genre = sorted[0][0];
      document.getElementById('genre-select').value = state.genre;

    state.pinned.clear();
    render();
  });
});

window.addEventListener('resize', () => { resize(); render(); });

// ========== 튜토리얼 (Spotlight Tour) ==========
const TOUR_STEPS = [
  {
    target: '#chart',
    title: 'Step 1 — 범프차트 읽는 법',
    desc: '<b>각 선</b> = 하나의 장르 (또는 게임)의 순위 변동\n<b>선 색상</b> = 장르/게임별 고유 색상으로 구분\n\n<b>X축</b> = 2021~2025년, <b>Y축</b> = 매출 순위 (1위가 위)\n선 위에 마우스를 올리면 매출·YoY 등 상세 정보가 나타납니다.',
    pos: 'center'
  },
  {
    target: '#chart',
    title: 'Step 2 — 장르 → 게임 드릴다운',
    desc: '장르 뷰에서 <b>선을 클릭</b>하면\n해당 장르 내 <b>게임별 순위 등락</b>을 볼 수 있습니다.\n\n게임 뷰에서는 앱 아이콘과 함께\n매출·다운로드·DAU를 확인할 수 있습니다.\n\n<span style="color:#fff;background:#1e40af;padding:2px 6px;border-radius:4px;font-weight:700">← 전체 장르</span> 버튼으로 돌아옵니다.',
    pos: 'center'
  },
  {
    target: '.controls',
    title: 'Step 3 — 뷰 전환 & 필터',
    desc: '<b>장르 / 게임</b> 뷰를 전환할 수 있습니다.\n\n게임 뷰에서는:\n　• <b>장르 선택</b> — 특정 장르의 게임만 보기\n　• <b>Top 10 / 20</b> — 표시할 게임 수 조절\n\n선을 클릭하면 해당 선이 <b>고정 하이라이트</b>됩니다.\n다시 클릭하면 해제됩니다.',
    pos: 'bottom'
  },
  {
    target: '.top-nav',
    title: 'Step 4 — 트리맵과 함께 보기',
    desc: '상단 메뉴에서 <b>트리맵</b> 탭을 클릭하면\n특정 연도의 <b>시장 구조 스냅샷</b>을 볼 수 있습니다.\n\n순위 변동 차트로 <b>흐름</b>을 파악하고,\n트리맵으로 <b>구조</b>를 파악하면\n시장을 입체적으로 이해할 수 있습니다.\n\n이제 자유롭게 탐색해 보세요!',
    pos: 'bottom'
  }
];

let tourStep = 0;
let tourActive = false;

function startTour() {
  tourStep = 0;
  tourActive = true;
  document.getElementById('tour-overlay').style.display = 'block';
  document.getElementById('tour-help-btn').style.display = 'none';
  showTourStep();
}

function endTour() {
  tourActive = false;
  document.getElementById('tour-overlay').style.display = 'none';
  document.getElementById('tour-spotlight').style.display = 'none';
  document.getElementById('tour-popover').style.display = 'none';
  document.getElementById('tour-help-btn').style.display = 'flex';
  localStorage.setItem('bumpchart-tour-done', '1');
}

function showTourStep() {
  if (tourStep >= TOUR_STEPS.length) { endTour(); return; }
  const step = TOUR_STEPS[tourStep];
  const el = document.querySelector(step.target);
  if (!el) { tourStep++; showTourStep(); return; }

  const rect = el.getBoundingClientRect();
  const pad = 6;
  const spot = document.getElementById('tour-spotlight');
  spot.style.display = 'block';
  spot.style.left = (rect.left - pad) + 'px';
  spot.style.top = (rect.top - pad) + 'px';
  spot.style.width = (rect.width + pad*2) + 'px';
  spot.style.height = (rect.height + pad*2) + 'px';

  const pop = document.getElementById('tour-popover');
  pop.style.display = 'block';
  pop.innerHTML =
    '<div class="tour-step-num">STEP ' + (tourStep+1) + ' / ' + TOUR_STEPS.length + '</div>' +
    '<div class="tour-title">' + step.title + '</div>' +
    '<div class="tour-desc">' + step.desc.replace(/\n/g,'<br>') + '</div>' +
    '<div class="tour-btns">' +
      (tourStep > 0 ? '<button class="tour-btn tour-btn-prev" onclick="prevTourStep()">← 이전</button>' : '<span></span>') +
      (tourStep < TOUR_STEPS.length - 1
        ? '<button class="tour-btn tour-btn-next" onclick="nextTourStep()">다음 →</button>'
        : '<button class="tour-btn tour-btn-next" onclick="endTour()">시작하기!</button>') +
    '</div>' +
    '<button class="tour-skip" onclick="endTour()">건너뛰기</button>';

  requestAnimationFrame(() => {
    const popRect = pop.getBoundingClientRect();
    let px, py;
    if (step.pos === 'center') {
      px = window.innerWidth/2 - popRect.width/2;
      py = Math.min(rect.top + rect.height/2 - popRect.height/2, window.innerHeight - popRect.height - 20);
      py = Math.max(20, py);
    } else if (step.pos === 'bottom') {
      px = rect.left + rect.width/2 - popRect.width/2;
      py = rect.bottom + pad + 12;
    } else if (step.pos === 'top') {
      px = rect.left + rect.width/2 - popRect.width/2;
      py = rect.top - pad - popRect.height - 12;
    } else {
      px = rect.right + pad + 12;
      py = rect.top + rect.height/2 - popRect.height/2;
    }
    px = Math.max(12, Math.min(px, window.innerWidth - popRect.width - 12));
    py = Math.max(12, Math.min(py, window.innerHeight - popRect.height - 12));
    pop.style.left = px + 'px';
    pop.style.top = py + 'px';
  });
}

function nextTourStep() { tourStep++; showTourStep(); }
function prevTourStep() { tourStep = Math.max(0, tourStep-1); showTourStep(); }

window.addEventListener('scroll', () => {
  if (tourActive) showTourStep();
}, { passive: true });

document.addEventListener('keydown', (e) => {
  if (tourActive && e.key === 'Escape') endTour();
  if (tourActive && e.key === 'ArrowRight') nextTourStep();
  if (tourActive && e.key === 'ArrowLeft') prevTourStep();
});

// 첫 방문 시 자동 시작
if (!localStorage.getItem('bumpchart-tour-done')) {
  setTimeout(startTour, 800);
}
</script>

#tour-popover {
  background:#1e293b; border:1px solid #334155; border-radius:14px; padding:24px 28px 20px;
  max-width:380px; min-width:280px; box-shadow:0 12px 40px rgba(0,0,0,0.6);
  font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;
}
.tour-step-num { font-size:12px; color:#3b82f6; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.tour-title { font-size:18px; font-weight:800; color:#f8fafc; margin-bottom:10px; line-height:1.3; }
.tour-desc { font-size:14px; color:#cbd5e1; line-height:1.7; margin-bottom:18px; }
.tour-btns { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.tour-btn { padding:10px 20px; border-radius:8px; border:none; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.tour-btn-prev { background:#334155; color:#e2e8f0; }
.tour-btn-prev:hover { background:#475569; }
.tour-btn-next { background:#3b82f6; color:#fff; }
.tour-btn-next:hover { background:#2563eb; }
.tour-skip { display:block; margin:12px auto 0; background:none; border:none; color:#64748b; font-size:13px; cursor:pointer; font-family:inherit; }
.tour-skip:hover { color:#94a3b8; text-decoration:underline; }
#tour-help-btn:hover { background:#2563eb; transform:scale(1.1); }
</style>
</body>
</html>
